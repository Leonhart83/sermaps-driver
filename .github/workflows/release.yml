name: Build & Release APK

# Si attiva quando pubblichi un tag di versione, es. v1.2.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Allinea la versione al tag (pubspec + docs)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # versionCode monotòno derivato dalla versione: MAJOR*10000 + MINOR*100 + PATCH
          IFS='.' read -r MA MI PA <<< "$VERSION"
          BUILD=$(( ${MA:-0} * 10000 + ${MI:-0} * 100 + ${PA:-0} ))
          # pubspec.yaml: la versione dell'app segue il tag (build incrementale)
          sed -i -E "s/^version:.*/version: ${VERSION}+${BUILD}/" pubspec.yaml
          # Documentazione: allinea i riferimenti di versione
          sed -i -E "s/Versione [0-9]+\.[0-9]+\.[0-9]+/Versione ${VERSION}/g" docs/GUIDA.html
          sed -i -E "s/Manuale d'uso v[0-9]+\.[0-9]+\.[0-9]+/Manuale d'uso v${VERSION}/g" docs/GUIDA.html
          echo "Versione allineata a ${VERSION}+${BUILD}"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Dipendenze
        run: flutter pub get

      - name: Prepara la firma release
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.jks
          EOF

      - name: Build APK release
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: flutter build apk --release

      - name: Rinomina APK
        run: cp build/app/outputs/flutter-apk/app-release.apk SerMaps-Driver.apk

      - name: Estrai le note della versione dal CHANGELOG
        run: |
          TAG="${GITHUB_REF_NAME}"
          awk -v tag="## ${TAG}" '
            $0 == tag {f=1; next}
            /^## / {f=0}
            f {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Versione ${TAG}" > RELEASE_NOTES.md
          fi

      - name: Pubblica la Release con l'APK
        uses: softprops/action-gh-release@v2
        with:
          name: SerMaps Driver ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: SerMaps-Driver.apk

      - name: Salva la versione allineata sul repository
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IFS='.' read -r MA MI PA <<< "$VERSION"
          BUILD=$(( ${MA:-0} * 10000 + ${MI:-0} * 100 + ${PA:-0} ))
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "$DEFAULT_BRANCH"
          git checkout "$DEFAULT_BRANCH"
          sed -i -E "s/^version:.*/version: ${VERSION}+${BUILD}/" pubspec.yaml
          sed -i -E "s/Versione [0-9]+\.[0-9]+\.[0-9]+/Versione ${VERSION}/g" docs/GUIDA.html
          sed -i -E "s/Manuale d'uso v[0-9]+\.[0-9]+\.[0-9]+/Manuale d'uso v${VERSION}/g" docs/GUIDA.html
          git add pubspec.yaml docs/GUIDA.html
          # [skip ci] evita qualsiasi ri-esecuzione della pipeline
          git commit -m "chore: allinea versione a ${VERSION} [skip ci]" || echo "Nessuna modifica da salvare"
          git push origin "$DEFAULT_BRANCH"
