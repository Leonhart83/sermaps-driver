name: Build & Release APK

# Si attiva quando pubblichi un tag di versione, es. v1.2.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Dipendenze
        run: flutter pub get

      - name: Prepara la firma release
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.jks
          EOF

      - name: Build APK release
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: flutter build apk --release

      - name: Rinomina APK
        run: cp build/app/outputs/flutter-apk/app-release.apk SerMaps-Driver.apk

      - name: Pubblica la Release con l'APK
        uses: softprops/action-gh-release@v2
        with:
          name: SerMaps Driver ${{ github.ref_name }}
          files: SerMaps-Driver.apk
          generate_release_notes: true
